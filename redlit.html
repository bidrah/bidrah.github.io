<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Voltage Logger</title>

<style>

body{
font-family:system-ui;
background:#e8f3f1;
margin:0;
padding:8px;
padding-bottom:10vh;
transition:background .25s,color .25s;
}

body.dark{
background:#111;
color:#eee;
}

.container{
max-width:520px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
margin-bottom:6px;
}

.toggle{
cursor:pointer;
}

.title{
font-weight:600;
}

.mainBox{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.voltage{
font-size:52px;
font-weight:bold;
border:3px solid #222;
border-radius:14px;
padding:10px;
width:180px;
text-align:center;
background:white;
}

body.dark .voltage{
background:#222;
border-color:#777;
}

.editBtn{
font-size:14px;
padding:8px 10px;
border-radius:8px;
border:none;
background:#0b8f7a;
color:white;
}

.presets{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-bottom:8px;
}

.presets button{
padding:12px;
font-size:18px;
border-radius:8px;
border:2px solid #333;
background:white;
}

body.dark .presets button{
background:#222;
border-color:#666;
color:white;
}

.presets button.mean{
background:#0b8f7a;
color:white;
}

.nav{
display:flex;
gap:6px;
margin-bottom:8px;
}

.nav button{
flex:1;
padding:8px;
font-size:14px;
border-radius:8px;
border:2px solid #333;
background:white;
}

body.dark .nav button{
background:#222;
border-color:#666;
color:white;
}

.listContainer{
height:300px;
overflow-y:auto;
border:2px solid #333;
border-radius:8px;
background:white;
}

body.dark .listContainer{
background:#1a1a1a;
border-color:#666;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

td,th{
border:1px solid #aaa;
padding:4px;
text-align:center;
}

body.dark td, body.dark th{
border-color:#555;
}

.abnormal{
background:#ffe1b3;
}

body.dark .abnormal{
background:#664400;
}

.export{
margin-top:6px;
width:100%;
padding:10px;
font-size:15px;
border:none;
border-radius:8px;
background:#0b8f7a;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="toggle" onclick="toggleNight()">🌙</div>
<div class="title" id="cellTitle">Cell 1</div>
<div id="progress">1 / 85</div>
</div>

<div class="mainBox">
<div class="voltage" id="voltageDisplay">--</div>
<button class="editBtn" onclick="editVoltage()">Edit</button>
</div>

<div class="presets" id="presetButtons"></div>

<div class="nav">
<button onclick="prevCell()">Previous</button>
<button onclick="nextCell()">Next</button>
</div>

<div class="listContainer" id="listContainer">
<table>
<thead>
<tr>
<th>Cell</th>
<th>Volt</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<button class="export" onclick="exportData()">Export</button>

</div>

<script>

let currentCell=1
let maxCells=85
let voltages={}
let meanVoltage=1.40

function askMean(){
let mean=prompt("Enter mean voltage","1.40")
if(mean) meanVoltage=parseFloat(mean)
generateButtons()
}

function generateButtons(){

let container=document.getElementById("presetButtons")
container.innerHTML=""

let start = meanVoltage-0.04

for(let i=0;i<9;i++){

let value=(start+(i*0.01)).toFixed(2)

let b=document.createElement("button")
b.innerText=value

if(i===4) b.classList.add("mean")

b.onclick=()=>setVoltage(value)

container.appendChild(b)

}

}

function updateDisplay(){

document.getElementById("cellTitle").innerText="Cell "+currentCell
document.getElementById("progress").innerText=currentCell+" / "+maxCells

document.getElementById("voltageDisplay").innerText=
voltages[currentCell]||"--"

updateTable()

}

function setVoltage(v){
voltages[currentCell]=v
nextCell()
updateDisplay()
}

function editVoltage(){

let current=voltages[currentCell]||""

let v=prompt("Enter voltage",current)

if(v){
voltages[currentCell]=parseFloat(v).toFixed(2)
updateDisplay()
}

}

document.getElementById("voltageDisplay").onclick=editVoltage

function nextCell(){
if(currentCell<maxCells) currentCell++
updateDisplay()
}

function prevCell(){
if(currentCell>1) currentCell--
updateDisplay()
}

function updateTable(){

let tbody=document.getElementById("tableBody")
tbody.innerHTML=""

for(let i=1;i<=maxCells;i++){

if(voltages[i]){

let v=parseFloat(voltages[i])

let row=document.createElement("tr")

if(Math.abs(v-meanVoltage)>0.02)
row.classList.add("abnormal")

row.innerHTML=`<td>${i}</td><td>${voltages[i]}</td>`

tbody.appendChild(row)

}

}

autoScroll()

}

function autoScroll(){
let container=document.getElementById("listContainer")
container.scrollTop=container.scrollHeight
}

function exportData(){

let text="Cell\tVoltage\n"

for(let i=1;i<=maxCells;i++){

if(voltages[i]){
text+=i+"\t"+voltages[i]+"\n"
}

}

let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="cell_voltages.txt"
a.click()

}

function toggleNight(){
document.body.classList.toggle("dark")
}

askMean()
updateDisplay()

</script>

</body>
</html>
