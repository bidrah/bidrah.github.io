<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EJ Logger</title>

<style>

body{
font-family:system-ui;
background:#e8f3f1;
margin:0;
padding:10px;
}

.container{
max-width:600px;
margin:auto;
}

h2{
text-align:center;
margin:6px 0 12px;
}

.row{
display:flex;
gap:6px;
margin-bottom:8px;
flex-wrap:wrap;
}

input,select,button{
font-size:16px;
padding:10px;
border-radius:8px;
border:1px solid #bbb;
flex:1;
min-width:0;
}

.big{
font-size:18px;
font-weight:bold;
text-align:center;
}

button{
background:#0f766e;
color:white;
border:none;
}

button:active{
transform:scale(.97);
}

.export{
background:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
margin-top:12px;
}

td,th{
border:1px solid #ccc;
padding:6px;
word-break:break-word;
}

</style>
</head>

<body>

<div class="container">

<h2>EJ Logger</h2>

<div class="row">
<input class="big" id="ejA" placeholder="18">
<div style="align-self:center;font-weight:bold">EJ</div>
<input class="big" id="ejB" placeholder="01">
</div>

<input list="sections" id="section" placeholder="Search section">

<datalist id="sections">

<script>

for(let i=1;i<=54;i++){
let n=String(i).padStart(2,"0")
document.write(`<option value="TSM${n}">`)
}

for(let i=1;i<=81;i++){
let n=String(i).padStart(2,"0")
document.write(`<option value="TSD${n}">`)
}

</script>

</datalist>

<div class="row">
<input class="big" id="locA" placeholder="18">
<div style="align-self:center;font-weight:bold">/</div>
<input class="big" id="locB" placeholder="339">
</div>

<div class="row">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<label>
<input type="checkbox" id="grease"> Greasing done
</label>

<input type="date" id="date">

<select id="staff">

<option>Faisal K K</option>
<option>Sanoop A</option>
<option>Sanuraj E K</option>
<option>Sudheep K S</option>
<option>Unais V M</option>
<option>Vimal V J</option>
<option selected>Abid Rahman M S</option>
<option>Praveesh A P</option>
<option>Arun B</option>
<option>Shahadudeen K K</option>
<option>Stalin C J</option>

</select>

<input id="remarks" placeholder="Remarks">

<div class="row">
<button onclick="add()">Add Entry</button>
<button class="export" onclick="exportCSV()">Export CSV</button>
</div>

<table id="table">

<tr>
<th>Staff</th>
<th>Date</th>
<th>Section</th>
<th>EJ</th>
<th>Location</th>
<th>Grease</th>
<th>Remarks</th>
</tr>

</table>

</div>

<script>

let data=[]

function next(){

let v = Number(document.getElementById("ejB").value || 0)

v = v + 2

document.getElementById("ejB").value = String(v).padStart(2,"0")

}

function prev(){

let v = Number(document.getElementById("ejB").value || 0)

v = v - 2

if(v < 1) v = 1

document.getElementById("ejB").value = String(v).padStart(2,"0")

}

function formatDate(d){

if(!d) return ""

let p=d.split("-")

return `${p[2]}/${p[1]}/${p[0]}`
}

function add(){

let ej = ejA.value+"/EJ-"+ejB.value

let loc = locA.value+"/"+locB.value

let row={
staff:staff.value,
date:formatDate(date.value),
section:section.value,
ej:ej,
loc:loc,
grease:grease.checked?"Greasing done":"Greasing not done",
remarks:remarks.value
}

data.push(row)

let t=document.getElementById("table")

let r=t.insertRow()

r.insertCell().innerText=row.staff
r.insertCell().innerText=row.date
r.insertCell().innerText=row.section
r.insertCell().innerText=row.ej
r.insertCell().innerText=row.loc
r.insertCell().innerText=row.grease
r.insertCell().innerText=row.remarks

remarks.value=""

}

function exportCSV(){

let text=""

data.forEach(d=>{
text+=`${d.staff}\t${d.date}\t${d.section}\t${d.ej}\t${d.loc}\t${d.grease}\t${d.remarks}\n`
})

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="EJ_log.csv"

a.click()

}

</script>

</body>
</html>
